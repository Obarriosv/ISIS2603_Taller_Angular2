<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>WeatherAndes — Ciudades</h1>

    <button class="btn btn-primary" (click)="openCreateForm()">
      Crear Ciudad
    </button>
  </div>

  <app-city-create
    *ngIf="showCreateForm"
    (cityCreated)="onCityCreated($event)"
    (cancel)="closeCreateForm()"
  ></app-city-create>

  <div *ngIf="cities.length === 0" class="alert alert-warning">
    No se cargaron ciudades. Revise la consola del navegador.
  </div>

  <table class="table table-striped">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Ciudad</th>
        <th>País</th>
        <th>Acción</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let city of cities">
        <td>{{ city.id }}</td>
        <td>{{ city.name }}</td>
        <td>{{ city.country.name }}</td>
        <td>
          <button class="btn btn-outline-secondary btn-sm" (click)="selectCity(city)">
            Ver Detalle
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <app-city-detail
    *ngIf="selectedCity"
    [city]="selectedCity"
  ></app-city-detail>

</div>
